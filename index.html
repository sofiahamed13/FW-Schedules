<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copy Text with Current Date</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    body {
      background-color: #A4CFDF;
    }
    .container {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
      font-family: Arial, sans-serif;
      height: 80px;
    }
    .text-box {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-around;
      align-items: center;
      width: 450px;
    }
    button {
      width: 60px;
      height: 30px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
    p {
      font-weight: bolder;
      font-size: 20px;
      font-family: Arial, sans-serif;
    }
    h1 {
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      font-weight: bolder;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>FW Start & End Time</h1>

  <div class="container">
    <div class="text-box">
      <p id="startText"></p>
      <button onclick="copyToClipboard('startText', this)"><i class="fa-regular fa-clone"></i></button>
    </div>

    <div class="text-box">
      <p id="endText"></p>
      <button onclick="copyToClipboard('endText', this)"><i class="fa-regular fa-clone"></i></button>
    </div>
  </div>

  <script>
    // 🕒 Function to get Indian Standard Time (IST)
    function getIndianTime() {
      const now = new Date();
      const utc = now.getTime() + now.getTimezoneOffset() * 60000;
      const ist = new Date(utc + (5.5 * 60 * 60 * 1000));
      return ist;
    }

    // 📅 Function to get current date in DD/MM/YYYY format
    function getCurrentDate() {
      const now = getIndianTime();
      const day = String(now.getDate()).padStart(2, '0');
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const year = now.getFullYear();
      return `${day}/${month}/${year}`;
    }

    // 🕓 Determine time slot and return correct FW time
    function getFWTime() {
      const now = getIndianTime();
      const hour = now.getHours();
      const minute = now.getMinutes();

      // Default time (11:30 PM – 3:29 PM)
      let startTime = "12:30";
      let endTime = "12:45";

      if (hour === 15 && minute >= 30 || (hour === 16 && minute < 30)) { startTime = "13:30"; endTime = "13:45"; }
      else if (hour === 16 && minute >= 30 || (hour === 17 && minute < 30)) { startTime = "14:30"; endTime = "14:45"; }
      else if (hour === 17 && minute >= 30 || (hour === 18 && minute < 30)) { startTime = "15:30"; endTime = "15:45"; }
      else if (hour === 18 && minute >= 30 || (hour === 19 && minute < 30)) { startTime = "16:30"; endTime = "16:45"; }
      else if (hour === 19 && minute >= 30 || (hour === 20 && minute < 30)) { startTime = "17:30"; endTime = "17:45"; }
      else if (hour === 20 && minute >= 30 || (hour === 21 && minute < 30)) { startTime = "18:30"; endTime = "18:45"; }
      else if (hour === 21 && minute >= 30 || (hour === 22 && minute < 30)) { startTime = "19:30"; endTime = "19:45"; }
      else if (hour === 22 && minute >= 30 || (hour === 23 && minute < 30)) { startTime = "20:30"; endTime = "20:45"; }
      else if (hour === 23 && minute >= 30) { startTime = "12:30"; endTime = "12:45"; }

      return { startTime, endTime };
    }

    // ⚙️ Update texts on page load
    document.addEventListener('DOMContentLoaded', function() {
      const currentDate = getCurrentDate();
      const { startTime, endTime } = getFWTime();

      document.getElementById('startText').textContent = `/a Start FW at ${startTime} on ${currentDate}`;
      document.getElementById('endText').textContent = `/a End FW at ${endTime} on ${currentDate}`;
    });

    // 📋 Copy function
    function copyToClipboard(elementId, button) {
      const text = document.getElementById(elementId).textContent;
      navigator.clipboard.writeText(text).then(() => {
        button.innerHTML = "✔️";
        setTimeout(() => button.innerHTML = '<i class="fa-regular fa-clone"></i>', 1500);
      }).catch(err => alert("Copy failed: " + err));
    }
  </script>

</body>
</html>

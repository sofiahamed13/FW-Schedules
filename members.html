<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YH Member List</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0a0a1a;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 20px;
  }

  .header {
    text-align: center;
    padding: 30px 20px;
    margin-bottom: 30px;
    background: linear-gradient(135deg, #1a1a3e, #0d0d2b);
    border-radius: 16px;
    border: 1px solid #2a2a5a;
    box-shadow: 0 0 30px rgba(100, 100, 255, 0.1);
  }

  .header h1 {
    font-size: 2.2em;
    background: linear-gradient(90deg, #00d4ff, #7b2fff, #ff2d95);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  .header p {
    color: #8888aa;
    font-size: 0.95em;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 25px;
  }

  .stat-item {
    background: linear-gradient(135deg, #1a1a3e, #12122e);
    border: 1px solid #2a2a5a;
    border-radius: 12px;
    padding: 12px 24px;
    text-align: center;
    min-width: 140px;
  }

  .stat-item .stat-num {
    font-size: 1.8em;
    font-weight: 700;
    color: #00d4ff;
  }

  .stat-item .stat-label {
    font-size: 0.8em;
    color: #8888aa;
    margin-top: 2px;
  }

  .search-box {
    display: flex;
    justify-content: center;
    margin-bottom: 25px;
  }

  .search-box input {
    width: 100%;
    max-width: 500px;
    padding: 12px 20px;
    border-radius: 30px;
    border: 1px solid #3a3a6a;
    background: #12122e;
    color: #e0e0e0;
    font-size: 1em;
    outline: none;
    transition: border-color 0.3s;
  }

  .search-box input:focus {
    border-color: #00d4ff;
    box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
  }

  .search-box input::placeholder {
    color: #555577;
  }

  .rank-section {
    margin-bottom: 25px;
  }

  .rank-title {
    font-size: 1.1em;
    font-weight: 700;
    padding: 10px 20px;
    margin-bottom: 10px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .rank-title .rank-badge {
    padding: 3px 12px;
    border-radius: 6px;
    font-size: 0.85em;
    font-weight: 700;
    color: #fff;
  }

  .rank-title .member-count {
    margin-left: auto;
    font-size: 0.8em;
    color: #8888aa;
    font-weight: 400;
  }

  /* Rank Colors */
  .rank-ld { background: linear-gradient(90deg, rgba(255,215,0,0.15), transparent); border-left: 3px solid #ffd700; }
  .rank-ld .rank-badge { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }

  .rank-dep { background: linear-gradient(90deg, rgba(255,165,0,0.15), transparent); border-left: 3px solid #ffa500; }
  .rank-dep .rank-badge { background: linear-gradient(135deg, #ffa500, #ff8c00); color: #000; }

  .rank-8 { background: linear-gradient(90deg, rgba(255,45,149,0.15), transparent); border-left: 3px solid #ff2d95; }
  .rank-8 .rank-badge { background: linear-gradient(135deg, #ff2d95, #e0006f); }

  .rank-7 { background: linear-gradient(90deg, rgba(168,85,247,0.15), transparent); border-left: 3px solid #a855f7; }
  .rank-7 .rank-badge { background: linear-gradient(135deg, #a855f7, #7c3aed); }

  .rank-6 { background: linear-gradient(90deg, rgba(59,130,246,0.15), transparent); border-left: 3px solid #3b82f6; }
  .rank-6 .rank-badge { background: linear-gradient(135deg, #3b82f6, #2563eb); }

  .rank-5 { background: linear-gradient(90deg, rgba(6,182,212,0.15), transparent); border-left: 3px solid #06b6d4; }
  .rank-5 .rank-badge { background: linear-gradient(135deg, #06b6d4, #0891b2); }

  .rank-4 { background: linear-gradient(90deg, rgba(16,185,129,0.15), transparent); border-left: 3px solid #10b981; }
  .rank-4 .rank-badge { background: linear-gradient(135deg, #10b981, #059669); }

  .rank-3 { background: linear-gradient(90deg, rgba(132,204,22,0.15), transparent); border-left: 3px solid #84cc16; }
  .rank-3 .rank-badge { background: linear-gradient(135deg, #84cc16, #65a30d); color: #000; }

  .rank-2 { background: linear-gradient(90deg, rgba(234,179,8,0.15), transparent); border-left: 3px solid #eab308; }
  .rank-2 .rank-badge { background: linear-gradient(135deg, #eab308, #ca8a04); color: #000; }

  .rank-1 { background: linear-gradient(90deg, rgba(148,163,184,0.15), transparent); border-left: 3px solid #94a3b8; }
  .rank-1 .rank-badge { background: linear-gradient(135deg, #94a3b8, #64748b); }

  .member-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .member-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 10px;
    transition: all 0.2s ease;
    border: 1px solid transparent;
  }

  .member-item:hover {
    background: rgba(255, 255, 255, 0.07);
    border-color: rgba(255, 255, 255, 0.1);
    transform: translateX(4px);
  }

  .member-item.checked {
    background: rgba(0, 212, 255, 0.08);
    border-color: rgba(0, 212, 255, 0.2);
  }

  .member-serial {
    font-size: 0.8em;
    color: #555577;
    min-width: 28px;
    text-align: center;
  }

  .member-name {
    flex: 1;
    font-size: 0.95em;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 6px;
    transition: all 0.2s;
    user-select: all;
    position: relative;
  }

  .member-name:hover {
    background: rgba(255, 255, 255, 0.08);
  }

  .member-name:active {
    transform: scale(0.98);
  }

  .copy-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: linear-gradient(135deg, #00d4ff, #7b2fff);
    color: #fff;
    padding: 12px 28px;
    border-radius: 30px;
    font-size: 0.9em;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 1000;
    pointer-events: none;
  }

  .copy-toast.show {
    transform: translateX(-50%) translateY(0);
  }

  .checkbox-wrapper {
    position: relative;
  }

  .checkbox-wrapper input[type="checkbox"] {
    display: none;
  }

  .checkbox-wrapper .custom-check {
    width: 22px;
    height: 22px;
    border: 2px solid #3a3a6a;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    background: rgba(255, 255, 255, 0.03);
  }

  .checkbox-wrapper .custom-check:hover {
    border-color: #00d4ff;
    box-shadow: 0 0 8px rgba(0, 212, 255, 0.3);
  }

  .checkbox-wrapper input[type="checkbox"]:checked + .custom-check {
    background: linear-gradient(135deg, #00d4ff, #7b2fff);
    border-color: transparent;
    box-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
  }

  .checkbox-wrapper input[type="checkbox"]:checked + .custom-check::after {
    content: '✓';
    color: #fff;
    font-size: 14px;
    font-weight: 700;
  }

  .member-rank-tag {
    font-size: 0.75em;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
    opacity: 0.8;
  }

  .tag-ld { background: rgba(255,215,0,0.2); color: #ffd700; }
  .tag-dep { background: rgba(255,165,0,0.2); color: #ffa500; }
  .tag-8 { background: rgba(255,45,149,0.2); color: #ff2d95; }
  .tag-7 { background: rgba(168,85,247,0.2); color: #a855f7; }
  .tag-6 { background: rgba(59,130,246,0.2); color: #3b82f6; }
  .tag-5 { background: rgba(6,182,212,0.2); color: #06b6d4; }
  .tag-4 { background: rgba(16,185,129,0.2); color: #10b981; }
  .tag-3 { background: rgba(132,204,22,0.2); color: #84cc16; }
  .tag-2 { background: rgba(234,179,8,0.2); color: #eab308; }
  .tag-1 { background: rgba(148,163,184,0.2); color: #94a3b8; }

  .clear-all-btn {
    display: block;
    margin: 30px auto;
    padding: 12px 30px;
    background: linear-gradient(135deg, #ff2d55, #ff6b6b);
    color: #fff;
    border: none;
    border-radius: 30px;
    font-size: 0.95em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(255, 45, 85, 0.3);
  }

  .clear-all-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 45, 85, 0.5);
  }

  .footer {
    text-align: center;
    padding: 20px;
    color: #444466;
    font-size: 0.8em;
    margin-top: 20px;
  }

  @media (max-width: 600px) {
    body { padding: 10px; }
    .header h1 { font-size: 1.5em; }
    .member-item { padding: 8px 10px; gap: 8px; }
    .stat-item { min-width: 100px; padding: 10px 16px; }
    .stat-item .stat-num { font-size: 1.4em; }
  }
</style>
</head>

    { rank: "1", tag: "[1/YH]", name: "shlok_Ivanov" }
  ];

  const rankConfig = {
    "LD": { label: "LEADER", class: "ld", title: "👑 LEADER" },
    "DEP": { label: "DEPUTY LEADER", class: "dep", title: "⭐ DEPUTY LEADERS" },
    "8": { label: "Rank 8", class: "8", title: "🔥 RANK 8" },
    "7": { label: "Rank 7", class: "7", title: "💎 RANK 7" },
    "6": { label: "Rank 6", class: "6", title: "💠 RANK 6" },
    "5": { label: "Rank 5", class: "5", title: "🌊 RANK 5" },
    "4": { label: "Rank 4", class: "4", title: "🌿 RANK 4" },
    "3": { label: "Rank 3", class: "3", title: "🍀 RANK 3" },
    "2": { label: "Rank 2", class: "2", title: "🌙 RANK 2" },
    "1": { label: "Rank 1", class: "1", title: "🔘 RANK 1" }
  };

  function getCheckedState() {
    const data = localStorage.getItem('yh_checklist');
    return data ? JSON.parse(data) : {};
  }

  function saveCheckedState(state) {
    localStorage.setItem('yh_checklist', JSON.stringify(state));
  }

  function updateStats() {
    const state = getCheckedState();
    let checked = 0;
    members.forEach((m, i) => {
      if (state[i]) checked++;
    });
    document.getElementById('checkedCount').textContent = checked;
    document.getElementById('uncheckedCount').textContent = members.length - checked;
    document.getElementById('totalMembers').textContent = members.length;
  }

  function toggleCheck(index) {
    const state = getCheckedState();
    state[index] = !state[index];
    saveCheckedState(state);

    const item = document.querySelector(`.member-item[data-index="${index}"]`);
    const checkbox = item.querySelector('input[type="checkbox"]');
    checkbox.checked = state[index];
    if (state[index]) {
      item.classList.add('checked');
    } else {
      item.classList.remove('checked');
    }
    updateStats();
  }

  function copyName(name, element) {
    const fullText = name;
    navigator.clipboard.writeText(fullText).then(() => {
      const toast = document.getElementById('copyToast');
      toast.textContent = `📋 Copied: ${fullText}`;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1500);
    });
  }

  function clearAllChecks() {
    if (confirm('Are you sure you want to clear all checkmarks?')) {
      localStorage.removeItem('yh_checklist');
      document.querySelectorAll('.member-item').forEach(item => {
        item.classList.remove('checked');
        item.querySelector('input[type="checkbox"]').checked = false;
      });
      updateStats();
    }
  }

  function renderList() {
    const container = document.getElementById('memberContainer');
    container.innerHTML = '';
    const state = getCheckedState();

    const rankOrder = ["LD", "DEP", "8", "7", "6", "5", "4", "3", "2", "1"];
    let serial = 1;

    rankOrder.forEach(rank => {
      const rankMembers = [];
      members.forEach((m, i) => {
        if (m.rank === rank) {
          rankMembers.push({ ...m, globalIndex: i });
        }
      });

      if (rankMembers.length === 0) return;

      const config = rankConfig[rank];

      const section = document.createElement('div');
      section.className = 'rank-section';
      section.setAttribute('data-rank', rank);

      const title = document.createElement('div');
      title.className = `rank-title rank-${config.class}`;
      title.innerHTML = `
        <span class="rank-badge">${config.label}</span>
        ${config.title}
        <span class="member-count">${rankMembers.length} members</span>
      `;
      section.appendChild(title);

      const list = document.createElement('div');
      list.className = 'member-list';

      rankMembers.forEach(m => {
        const item = document.createElement('div');
        item.className = `member-item ${state[m.globalIndex] ? 'checked' : ''}`;
        item.setAttribute('data-index', m.globalIndex);
        item.setAttribute('data-name', m.name.toLowerCase());

        item.innerHTML = `
          <span class="member-serial">${serial}</span>
          <span class="member-rank-tag tag-${config.class}">${m.tag}</span>
          <span class="member-name" onclick="copyName('${m.name}', this)" title="Click to copy">${m.name}</span>
          <div class="checkbox-wrapper">
            <input type="checkbox" id="chk_${m.globalIndex}" ${state[m.globalIndex] ? 'checked' : ''} onchange="toggleCheck(${m.globalIndex})">
            <label class="custom-check" for="chk_${m.globalIndex}"></label>
          </div>
        `;

        list.appendChild(item);
        serial++;
      });

      section.appendChild(list);
      container.appendChild(section);
    });

    updateStats();
  }

  // Search
  document.getElementById('searchInput').addEventListener('input', function () {
    const query = this.value.toLowerCase().trim();
    document.querySelectorAll('.member-item').forEach(item => {
      const name = item.getAttribute('data-name');
      if (name.includes(query)) {
        item.style.display = 'flex';
      } else {
        item.style.display = 'none';
      }
    });

    document.querySelectorAll('.rank-section').forEach(section => {
      const visibleItems = section.querySelectorAll('.member-item[style="display: flex"], .member-item:not([style*="display: none"])');
      let hasVisible = false;
      section.querySelectorAll('.member-item').forEach(item => {
        if (item.style.display !== 'none') hasVisible = true;
      });
      section.style.display = hasVisible ? 'block' : 'none';
    });
  });

  // Init
  renderList();
</script>
